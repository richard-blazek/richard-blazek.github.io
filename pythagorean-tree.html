<!DOCTYPE html>
<html lang="en">

<head>
  <title>Pythagorean Tree</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Interactive Pythagorean tree fractal generator">
  <meta name="author" content="Richard Blažek">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="canonical" href="https://richardblazek.com/">
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    #tree-container {
      width: 100%;
      background: #001;
    }

    #tree-container svg {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <main>
    <h1>Pythagorean Tree</h1>
    <p>
        This is an interactive generator of the Pythagorean tree fractal. You can
        adjust the depth of the tree and twist it right or left using the sliders
        below.
    </p>
    <p class="controls">
      Twist
      <input type="range" id="twist-slider" min="-10" max="10" step="1" value="0">
      <span id="twist-value">1</span>
    </p>
    <p class="controls">
      Depth
      <input type="range" id="count-slider" min="0" max="15" step="1" value="7">
      <span id="count-value">8</span>
    </p>
    <div id="tree-container"></div>
  </main>
  <footer>
    © 2026 Richard Blažek. All rights reserved.
  </footer>

  <script src="assets/pythagorean-tree.js"></script>
  <script>
    const twistSlider = document.getElementById('twist-slider');
    const countSlider = document.getElementById('count-slider');
    const twistValue = document.getElementById('twist-value');
    const countValue = document.getElementById('count-value');
    const container = document.getElementById('tree-container');

    function update() {
      const twist = parseInt(twistSlider.value, 10);
      const count = parseInt(countSlider.value, 10);
      twistValue.textContent = twist >= 0
        ? `1.0 : ${Math.pow(5, twist/10).toFixed(1)}`
        : `${Math.pow(5, -twist/10).toFixed(1)} : 1.0`;
      countValue.textContent = count;

      container.innerHTML = pythagoreanTree(Math.pow(5, twist/10), count);
    }

    twistSlider.addEventListener('input', update);
    countSlider.addEventListener('input', update);
    update();
  </script>
</body>

</html>
