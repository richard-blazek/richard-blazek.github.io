<!DOCTYPE html>
<html lang="en">

<head>
  <title>Pythagorean Tree</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Interactive Pythagorean tree fractal generator">
  <meta name="author" content="Richard Blažek">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="canonical" href="https://richardblazek.com/">
  <style>
    body {
      font-family: "Source Code Pro", monospace;
      font-optical-sizing: auto;
      font-weight: 500;
      font-style: normal;
      background: #000;
      color: #FFF;
      margin: 0;
      padding: 2rem 0;
    }

    h1 {
      font-size: 4rem;
      text-align: center;
      margin: 0;
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      margin: 0;
      font-size: 1.5rem;
    }

    .controls button {
      width: 4rem;
      height: 4rem;
      font-size: 1.5rem;
      background-color: #000;
      color: #FFF;
      border: 0.1rem solid #FFF;
      border-radius: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls button:hover,
    .controls button:active {
      background-color: #FFF;
      color: #000;
    }

    #tree-container {
      width: 100%;
      max-width: 60rem;
      margin: 0 auto;
    }

    #tree-container svg {
      display: block;
      width: 100%;
      height: auto;
    }

    footer {
      text-align: center;
      color: #777;
      margin-top: 2rem;
    }
  </style>
</head>

<body>
  <main>
    <h1>pythagorean tree</h1>
    
    <div class="controls">
      <button id="btn-left" aria-label="Twist Left">&lt;</button>
      <span id="twist">1 : 1</span>
      <button id="btn-right" aria-label="Twist Right">&gt;</button>
    </div>

    <div id="tree-container"></div>
  </main>
  
  <footer>
    © 2026 Richard Blažek. All rights reserved.
  </footer>

  <script src="assets/pythagorean-tree.js"></script>
  <script>
    const left = document.getElementById('btn-left');
    const right = document.getElementById('btn-right');
    const twistLabel = document.getElementById('twist');
    const container = document.getElementById('tree-container');

    let twist = 0;
    function update() {
      if (twist >= 0) {
        const ratio = 1 + twist / 10;
        container.innerHTML = pythagoreanTree(ratio, 12);
        twistLabel.textContent = `1.0 : ${ratio.toFixed(1)}`;
      } else {
        const ratio = 1 - twist / 10;
        container.innerHTML = pythagoreanTree(1 / ratio, 12);
        twistLabel.textContent = `${ratio.toFixed(1)} : 1.0`;
      }
    }

    left.addEventListener('click', () => {
      twist = Math.max(-40, twist - 1);
      update();
    });

    right.addEventListener('click', () => {
      twist = Math.min(40, twist + 1);
      update();
    });

    update();
  </script>
</body>

</html>
