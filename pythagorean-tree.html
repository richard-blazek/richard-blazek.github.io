<!DOCTYPE html>
<html lang="en">

<head>
  <title>Pythagorean Tree</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta name="description" content="Interactive Pythagorean tree fractal generator">
  <meta name="author" content="Richard Blažek">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="canonical" href="https://richardblazek.com/">
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    #tree-container {
      width: 100%;
      background: #FFF;
    }

    #tree-container svg {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <main>
    <h1>Pythagorean Tree</h1>
    <p>
        This is an interactive generator of the Pythagorean tree fractal. You can
        twist it right or left using the slider below.
    </p>
    <p class="controls">
      Twist
      <input type="range" id="twist-slider" min="-40" max="40" step="1" value="0">
      <span id="twist-value">1</span>
    </p>
    <div id="tree-container"></div>
  </main>
  <footer>
    © 2026 Richard Blažek. All rights reserved.
  </footer>

  <script src="assets/pythagorean-tree.js"></script>
  <script>
    const twistSlider = document.getElementById('twist-slider');
    const twistValue = document.getElementById('twist-value');
    const container = document.getElementById('tree-container');

    function update() {
      const twist = parseInt(twistSlider.value, 10);
      if (twist >= 0) {
        const ratio = 1 + twist / 10;
        twistValue.textContent = `1 : ${ratio == 1 ? '1' : ratio.toFixed(1)}`;
        container.innerHTML = pythagoreanTree(ratio, 12);
      } else {
        const ratio = 1 - twist / 10;
        twistValue.textContent = `${ratio.toFixed(1)} : 1`;
        container.innerHTML = pythagoreanTree(1/ratio, 12);
      }
    }

    twistSlider.addEventListener('input', update);
    update();
  </script>
</body>

</html>
